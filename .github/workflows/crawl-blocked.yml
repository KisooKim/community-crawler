name: Crawl Blocked Sites

on:
  schedule:
    - cron: "30 */2 * * *" # 2시간마다 (메인 크롤링 30분 후)
  workflow_dispatch: # 수동 실행

jobs:
  crawl:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        timeout-minutes: 5
        shell: bash
        run: |
          python -c "import scrapling, sqlalchemy, httpx, bs4, imagehash, psycopg2, asyncpg, patchright" && echo "All packages already installed" || {
            pip install sqlalchemy pydantic pydantic-settings python-dotenv httpx beautifulsoup4 lxml imagehash Pillow psycopg2-binary asyncpg greenlet "scrapling[all]"
            python -m patchright install chromium
          }

      - name: Run blocked-site crawlers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEBUG: "false"
        run: |
          python -c "
          import app.models.trend
          from app.core.database import Base, sync_engine
          Base.metadata.create_all(sync_engine)
          from app.services.crawler_service import CrawlerService
          results = CrawlerService.crawl_all_parallel(only=list(CrawlerService.BLOCKED_SITES))
          for r in results:
              status = 'OK' if 'error' not in r else 'FAIL'
              name = r.get('site', 'unknown')
              count = r.get('processed', 0)
              print(f'{status} {name}: {count} articles')

          from app.core.database import get_sync_db
          from app.services.trend_service import TrendService
          with get_sync_db() as db:
              updated = TrendService(db).update_scores()
              print(f'Updated scores for {updated} trends')
          "
