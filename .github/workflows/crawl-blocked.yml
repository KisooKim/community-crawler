name: Crawl Blocked Sites

on:
  schedule:
    - cron: "0 * * * *" # 1시간마다
  workflow_dispatch: # 수동 실행

jobs:
  crawl:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Run blocked-site crawlers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEBUG: "false"
        run: |
          python -c "
          import time, sys, os, platform
          t0 = time.time()
          def log(msg): print(f'[{time.time()-t0:.1f}s] {msg}', flush=True)

          # Workaround: platform.uname() hangs on Python 3.14 + Windows (WMI bug)
          platform._uname_cache = platform.uname_result(
              'Windows',
              os.environ.get('COMPUTERNAME', ''),
              '11',
              '10.0.26200',
              os.environ.get('PROCESSOR_ARCHITECTURE', 'AMD64'),
          )

          log('importing modules...')
          import app.models.trend
          from app.core.database import Base, sync_engine
          log('creating tables...')
          Base.metadata.create_all(sync_engine)
          log('importing crawlers...')
          from app.services.crawler_service import CrawlerService
          from app.core.database import SyncSessionLocal
          log('starting crawl...')
          results = []
          for site_name in sorted(CrawlerService.BLOCKED_SITES):
              log(f'crawling {site_name}...')
              with SyncSessionLocal() as db:
                  service = CrawlerService(db)
                  try:
                      r = service.crawl_site(site_name)
                  except Exception as e:
                      r = {'site': site_name, 'error': str(e)}
                  results.append(r)
              cnt = r.get('processed', 0)
              log(f'{site_name} done: {cnt} articles')
          for r in results:
              status = 'OK' if 'error' not in r else 'FAIL'
              name = r.get('site', 'unknown')
              count = r.get('processed', 0)
              print(f'{status} {name}: {count} articles')

          from app.core.database import get_sync_db
          from app.services.trend_service import TrendService
          with get_sync_db() as db:
              updated = TrendService(db).update_scores()
              print(f'Updated scores for {updated} trends')
          "
