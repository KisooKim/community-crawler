name: Crawl Communities

on:
  schedule:
    - cron: "0 */2 * * *" # 2시간마다
  workflow_dispatch: # 수동 실행

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install sqlalchemy pydantic pydantic-settings python-dotenv
          pip install httpx beautifulsoup4 lxml
          pip install imagehash Pillow
          pip install psycopg2-binary asyncpg greenlet
          pip install "scrapling[all]"

      - name: Run crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEBUG: "false"
        run: |
          python3 -c "
          import app.models.trend
          from app.core.database import Base, sync_engine
          Base.metadata.create_all(sync_engine)
          from app.services.crawler_service import CrawlerService
          results = CrawlerService.crawl_all_parallel()
          for r in results:
              status = 'OK' if 'error' not in r else 'FAIL'
              name = r.get('site', 'unknown')
              count = r.get('processed', 0)
              print(f'{status} {name}: {count} articles')

          from app.core.database import get_sync_db
          from app.services.trend_service import TrendService
          with get_sync_db() as db:
              updated = TrendService(db).update_scores()
              print(f'Updated scores for {updated} trends')
          "
