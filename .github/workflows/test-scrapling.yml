name: Test Scrapling

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scrapling
        run: pip install "scrapling[all]" beautifulsoup4 lxml

      - name: Test fmkorea and arcalive with StealthyFetcher
        run: |
          python3 -c "
          from scrapling.fetchers import StealthyFetcher
          from bs4 import BeautifulSoup

          # fmkorea
          print('--- fmkorea ---')
          page = StealthyFetcher.fetch('https://www.fmkorea.com/best2', headless=True, network_idle=True)
          print(f'status={page.status}')
          soup = BeautifulSoup(page.body, 'lxml')
          items = soup.select('li.li')
          print(f'li.li items: {len(items)}')
          for it in items[:3]:
              link = it.select_one('h3.title a')
              if link:
                  print(f'  {link.get_text(strip=True)[:50]}')

          # arcalive
          print('--- arcalive ---')
          page2 = StealthyFetcher.fetch('https://arca.live/b/live', headless=True, network_idle=True)
          print(f'status={page2.status}')
          soup2 = BeautifulSoup(page2.body, 'lxml')
          rows = soup2.select('a.vrow.column')
          print(f'a.vrow.column rows: {len(rows)}')
          for r in rows[:3]:
              title_el = r.select_one('.title')
              if title_el:
                  print(f'  {title_el.get_text(strip=True)[:50]}')
          "
