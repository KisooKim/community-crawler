name: Test Scrapling

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "scrapling[all]" "camoufox[geoip]" beautifulsoup4 lxml
          patchright install chromium
          python3 -m camoufox fetch

      - name: Test multiple fetcher approaches
        run: |
          python3 << 'PYEOF'
          from bs4 import BeautifulSoup

          urls = {
              "fmkorea": "https://www.fmkorea.com/best2",
              "arcalive": "https://arca.live/b/live",
          }

          # 1) StealthyFetcher (patchright chromium)
          print("=== StealthyFetcher ===")
          from scrapling.fetchers import StealthyFetcher
          for name, url in urls.items():
              try:
                  page = StealthyFetcher.fetch(url, headless=True, network_idle=True)
                  soup = BeautifulSoup(page.body, "lxml")
                  count = len(soup.select("li.li" if name == "fmkorea" else "a.vrow.column"))
                  print(f"  {name}: status={page.status}, items={count}")
              except Exception as e:
                  print(f"  {name}: ERROR {e}")

          # 2) StealthyFetcher + solve_cloudflare (for arcalive)
          print("=== StealthyFetcher + solve_cloudflare ===")
          for name, url in urls.items():
              try:
                  page = StealthyFetcher.fetch(url, headless=True, network_idle=True, solve_cloudflare=True)
                  soup = BeautifulSoup(page.body, "lxml")
                  count = len(soup.select("li.li" if name == "fmkorea" else "a.vrow.column"))
                  print(f"  {name}: status={page.status}, items={count}")
              except Exception as e:
                  print(f"  {name}: ERROR {e}")

          # 3) Camoufox direct (Firefox-based stealth)
          print("=== Camoufox direct ===")
          from camoufox.sync_api import Camoufox
          with Camoufox(headless=True) as browser:
              page = browser.new_page()
              for name, url in urls.items():
                  try:
                      page.goto(url, wait_until="networkidle", timeout=30000)
                      html = page.content()
                      soup = BeautifulSoup(html, "lxml")
                      count = len(soup.select("li.li" if name == "fmkorea" else "a.vrow.column"))
                      print(f"  {name}: items={count}")
                      if count > 0:
                          sel = "h3.title a" if name == "fmkorea" else ".title"
                          for el in soup.select(sel)[:3]:
                              print(f"    {el.get_text(strip=True)[:50]}")
                  except Exception as e:
                      print(f"  {name}: ERROR {e}")
          PYEOF
