name: Cleanup Old Cached Images

on:
  schedule:
    - cron: "0 6 * * *" # 매일 06:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install sqlalchemy pydantic pydantic-settings python-dotenv
          pip install httpx
          pip install psycopg2-binary asyncpg

      - name: Cleanup old images
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEBUG: "false"
        run: |
          python3 -c "
          from app.core.config import get_settings
          from app.services.storage_cleanup import cleanup_old_images
          settings = get_settings()
          deleted = cleanup_old_images(
              settings.database_url,
              settings.supabase_url,
              settings.supabase_service_role_key,
              max_age_days=7,
          )
          print(f'Deleted {deleted} old cached images')
          "
